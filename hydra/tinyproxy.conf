# Tinyproxy config for ISP DPI bypass
# Install: apt install tinyproxy
# Place at: /etc/tinyproxy/tinyproxy.conf
# Used by Prowlarr to bypass deep packet inspection on indexer requests

Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 100

# Only allow connections from Netbird subnet
Allow 100.115.0.0/16

# Logging
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info

ViaProxyName "tinyproxy"
